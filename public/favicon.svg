<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Gradient for the head -->
    <linearGradient id="headGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#FDC955" />
      <stop offset="100%" stop-color="#F07F1F" />
    </linearGradient>
    
    <!-- Gradient for the blue arm -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#539CD7" />
      <stop offset="100%" stop-color="#2D5B96" />
    </linearGradient>
    
    <!-- Gradient for the main sweeping body -->
    <linearGradient id="mainSwooshGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD558" />
      <stop offset="50%" stop-color="#F38C25" />
      <stop offset="100%" stop-color="#E45C1D" />
    </linearGradient>

    <!-- Gradient for the bottom left leg -->
    <linearGradient id="leftLegGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FCD558" />
      <stop offset="100%" stop-color="#F38C25" />
    </linearGradient>
  </defs>

  <!-- Head -->
  <circle cx="52" cy="22" r="10" fill="url(#headGrad)" />

  <!-- Right Blue Arm -->
  <path d="M 53 41 C 60 33 65 25 67 17 L 67 58 C 64 52 59 47 53 41 Z" fill="url(#blueGrad)" />

  <!-- Main Orange/Yellow Swoosh (Top Left to Bottom Right) -->
  <path d="M 43 5 C 34 20 34 40 47 53 C 57 63 63 75 65 90 C 57 70 47 60 37 50 C 27 40 31 20 43 5 Z" fill="url(#mainSwooshGrad)" />

  <!-- Bottom Left Orange/Yellow Leg -->
  <path d="M 35 45 C 35 59 33 79 35 96 C 40 81 45 66 48 62 C 42 57 38 52 35 45 Z" fill="url(#leftLegGrad)" />
</svg>