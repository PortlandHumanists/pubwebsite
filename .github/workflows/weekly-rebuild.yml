name: Weekly Sunday Rebuild

on:
  workflow_dispatch:
  schedule:
    # 12:30 PM PDT (19:30 UTC) every Sunday
    # Note: in PST (winter, UTC-8) this fires at 11:30 AM — still fine since program ends at noon
    - cron: '30 19 * * 0'

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify rebuild
        run: curl -X POST -d '{}' https://api.netlify.com/build_hooks/69d2b0a798b1ce809912cb89
