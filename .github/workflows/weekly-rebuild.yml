name: Weekly Sunday Rebuild

on:
  workflow_dispatch:
  schedule:
    # 12:30 PM Pacific (20:30 UTC) every Sunday
    # During PDT (summer): UTC-7, so 20:30 UTC = 1:30 PM PDT
    # During PST (winter): UTC-8, so 20:30 UTC = 12:30 PM PST
    - cron: '30 20 * * 0'

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify rebuild
        run: curl -X POST -d '{}' https://api.netlify.com/build_hooks/69d2b0a798b1ce809912cb89
