# Netlify configuration for Astro + TinaCMS
# Required env vars (set in Netlify dashboard → Site settings → Environment variables):
#   TINA_PUBLIC_CLIENT_ID  — from app.tina.io project settings
#   TINA_TOKEN             — from app.tina.io project settings (keep secret)

[build]
  command = "npm run build"
  publish = "dist"


# Redirects from old Drupal site URLs
[[redirects]]
  from = "/vimeo-of-programs"
  to = "/events/past"
  status = 301

[[redirects]]
  from = "/vimeo-of-programs/*"
  to = "/events/past"
  status = 301


[[redirects]]
  from = "/content/hgp*scholarship*"
  to = "/scholarship"
  status = 301


[[redirects]]
  from = "/sites/default/files/PDF/*"
  to = "/uploads/:splat"
  status = 301

[[redirects]]
  from = "/sites/default/files/*"
  to = "/uploads/:splat"
  status = 301

# TinaCMS admin security headers
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
